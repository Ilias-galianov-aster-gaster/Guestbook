<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>Гостевая книга</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <div class="container">
        <h1>📖 Гостевая книга</h1>   <!-- задание Б: иконка -->

        <h2>💬 Сообщения</h2>

        {% if messages %}
            {% for msg in messages %}
                <!-- задание А: чередование классов -->
                <div class="message {% if loop.index0 % 2 == 0 %}message-even{% else %}message-odd{% endif %}">
                    <strong>👤 {{ msg.name }}</strong>   <!-- иконка пользователя -->
                    <small>📅 {{ msg.created_at|ru_date }}</small>   <!-- иконка + фильтр (задание Д) -->
                    <p>{{ msg.message }}</p>
                </div>
            {% endfor %}
        {% else %}
            <p>Пока нет сообщений. Будьте первым! 🥇</p>
        {% endif %}

        <div class="add-form">
            <h2>✍️ Оставить сообщение</h2>
            <form method="POST" action="/add">
                <input type="text" name="name" placeholder="Ваше имя" required>
                <textarea name="message" placeholder="Ваше сообщение" rows="4" required></textarea>
                <button type="submit">✉️ Отправить</button>   <!-- иконка на кнопке -->
            </form>
        </div>
    </div>
</body>
</html>
